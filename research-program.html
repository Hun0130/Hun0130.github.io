<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title><b>Sanghoon Lee</b> — Research Program</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --accent:#0072CE; --accent2:#59CBE8; --accent-soft:rgba(0,114,206,.08);
  --bg:#FFFFFF; --bg2:#F7F9FC; --panel:#FFFFFF; --panel-bd:#E2E8F0;
  --ink:#0B1220; --mut:#4F5B6F; --faint:#8B96A8;
  --brain:#B5740A; --nerve:#0072CE; --body:#CF3B39;
  --a:#6C4BD8; --b:#0072CE; --c:#0E7FB8; --d:#CF3B39; --e:#B5740A;
  --sans:'Inter','Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
  --serif:'Crimson Pro','Pretendard',Georgia,serif;
  --mono:'JetBrains Mono','Pretendard',monospace;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;font-size:16px}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden}
a{color:inherit}
.wrap{max-width:1100px;margin:0 auto;padding:0 26px}

/* ---------- TOP NAV ---------- */
.topnav{position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);background:rgba(255,255,255,.85);border-bottom:1px solid var(--panel-bd)}
.topnav .wrap{display:flex;align-items:center;justify-content:space-between;height:58px}
.logo{font-family:var(--mono);font-weight:600;font-size:.9rem;letter-spacing:.04em;color:var(--ink)}
.logo .accent{color:var(--accent)}
.langtoggle{font-family:var(--mono);background:none;border:1px solid var(--panel-bd);color:var(--ink);padding:.4rem .8rem;border-radius:7px;cursor:pointer;font-size:.78rem;font-weight:500;letter-spacing:.03em;transition:.2s}
.langtoggle:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}

/* ---------- HERO ---------- */
.hero{min-height:calc(100vh - 58px);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;padding:60px 26px 60px}
.keyword{font-family:var(--mono);font-size:clamp(15px,1.7vw,19px);font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin:0 0 22px;opacity:0;animation:rise .95s .12s forwards}
.hero h1{font-family:var(--serif);font-weight:600;font-size:clamp(30px,4.6vw,52px);line-height:1.14;letter-spacing:-.01em;margin:0 0 8px;max-width:24ch;opacity:0;animation:rise 1s .22s forwards}
.hero h1 .hl{background:linear-gradient(120deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .sub{color:var(--mut);font-size:clamp(14px,1.4vw,16px);line-height:1.7;max-width:760px;margin:20px auto 0;opacity:0;animation:rise 1s .4s forwards}
.pillars{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin:48px auto 0;max-width:840px;width:100%;opacity:0;animation:rise 1s .58s forwards}
.pillar{background:var(--panel);border:1px solid var(--panel-bd);border-radius:14px;padding:20px 18px;text-align:left;position:relative;overflow:hidden}
.pillar .pk{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}
.pillar h3{margin:5px 0 4px;font-size:22px;font-weight:800;letter-spacing:-.01em}
.pillar .motto{font-family:var(--serif);font-style:italic;font-size:17px;color:var(--ink)}
.pillar .pt{margin-top:10px;font-size:12.5px;color:var(--mut)}
.pillar .bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.p-brain .bar{background:var(--brain)} .p-nerve .bar{background:var(--nerve)} .p-body .bar{background:var(--body)}
.p-brain h3{color:var(--brain)} .p-nerve h3{color:var(--nerve)} .p-body h3{color:var(--body)}
.asym{margin:40px auto 0;max-width:64ch;font-size:15px;color:var(--mut);opacity:0;animation:rise 1s .76s forwards}
.asym b{color:var(--ink);font-weight:600}
.scrolldown{margin-top:50px;font-family:var(--mono);font-size:11px;letter-spacing:.26em;color:var(--faint);text-transform:uppercase;opacity:0;animation:rise 1s 1s forwards}
.scrolldown .arr{display:block;margin:12px auto 0;width:16px;height:16px;border-right:2px solid var(--faint);border-bottom:2px solid var(--faint);transform:rotate(45deg);animation:bob 1.8s ease-in-out infinite}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes bob{0%,100%{transform:rotate(45deg) translate(0,0)}50%{transform:rotate(45deg) translate(4px,4px)}}

/* ---------- LANDSCAPE ---------- */
.section{padding:64px 0 84px;background:var(--bg2);border-top:1px solid var(--panel-bd);border-bottom:1px solid var(--panel-bd)}
.sec-head{text-align:center;margin-bottom:10px}
.sec-head .kicker{display:block;font-family:var(--mono);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;font-weight:500}
.sec-head h2{font-family:var(--serif);font-weight:600;font-size:clamp(28px,3.6vw,42px);letter-spacing:-.01em;margin:0}
.sec-head p{color:var(--mut);max-width:920px;margin:14px auto 0;font-size:15px}

.stage-wrap{position:relative;margin:42px auto 0;max-width:1040px}
.stage{position:relative;width:100%;aspect-ratio:1100/680}
.stage svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.bandlabel{position:absolute;transform:translateX(-50%);font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);pointer-events:none;white-space:nowrap}
.edge{stroke-linecap:round;transition:stroke-opacity .25s,stroke-width .25s;fill:none}
.node{position:absolute;transform:translate(-50%,-50%);width:max-content;cursor:pointer;border:none;background:none;padding:0;font-family:inherit;text-align:left}
.node .chip{display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:11px;background:#fff;border:1px solid var(--nclr,var(--panel-bd));transition:transform .22s cubic-bezier(.2,.8,.2,1),box-shadow .22s;min-width:0}
.node:hover .chip,.node:focus-visible .chip{transform:translateY(-3px) scale(1.03);box-shadow:0 14px 36px rgba(11,18,32,.16),0 0 0 1px var(--nclr),0 0 26px -8px var(--nclr)}
.node .dot{width:13px;height:13px;border-radius:50%;flex:0 0 auto;background:var(--nclr);box-shadow:0 0 11px -2px var(--nclr)}
.node .ntxt b{display:block;font-size:13px;font-weight:600;letter-spacing:-.01em;line-height:1.2;color:var(--ink);white-space:nowrap}
.node .ntxt span{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:3px}
.node.banner .chip{background:#fff;border-width:1.5px;padding:13px 20px}
.node.banner .dot{width:17px;height:17px}
.node.banner .ntxt b{font-size:17px}
.node.bridge .chip{background:#fff;border-width:1.5px;padding:12px 18px}
.node.bridge .dot{width:16px;height:16px}
.node.bridge .ntxt b{font-size:15.5px}
.node.dim{opacity:.32;filter:saturate(.6)}
.stage.has-hover .edge:not(.on){stroke-opacity:.12}

.legend{display:flex;flex-wrap:wrap;gap:10px 22px;justify-content:center;margin:30px auto 0;font-size:12.5px;color:var(--mut)}
.legend span{display:inline-flex;align-items:center;gap:8px}
.legend i{width:22px;height:0;border-top-width:3px;border-top-style:solid;display:inline-block;border-radius:3px}
.hint{text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin-top:26px}
.archlist{max-width:760px;margin:34px auto 0;display:grid;gap:1px;background:var(--panel-bd);border:1px solid var(--panel-bd);border-radius:14px;overflow:hidden;box-shadow:0 8px 24px rgba(11,18,32,.05)}
.arch-row{background:#fff;padding:13px 18px;display:flex;flex-wrap:wrap;gap:3px 14px;align-items:baseline}
.arch-row b{font-weight:600;font-size:13.5px;color:var(--ink);letter-spacing:-.01em;white-space:nowrap}
.arch-row>span{font-size:13px;color:var(--mut);line-height:1.5}
.arch-row.dir{border-left:3px solid var(--accent)}
.arch-row.share{border-left:3px solid var(--faint)}

.infobar{max-width:920px;margin:26px auto 0;min-height:74px;background:#fff;border:1px solid var(--panel-bd);border-radius:14px;padding:18px 22px;transition:border-color .25s;display:flex;gap:18px;align-items:flex-start;box-shadow:0 8px 24px rgba(11,18,32,.05)}
.infobar .ib-dot{width:14px;height:14px;border-radius:5px;margin-top:5px;flex:0 0 auto;background:var(--accent)}
.infobar .ib-q{font-weight:600;font-size:18px;line-height:1.4}
.infobar .ib-c{margin-top:7px;font-size:13px;color:var(--mut)}
.infobar .ib-c b{color:var(--ink);font-weight:600}

/* ---------- AXIS PAGES ---------- */
.axis-view{display:none;min-height:100vh;padding:0 0 100px;animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
body.axis-open #map-view{display:none}
.topbar{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--panel-bd)}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:60px;padding-top:10px;padding-bottom:10px;flex-wrap:wrap}
.tb-left{display:flex;gap:9px;align-items:center;flex:0 0 auto}
.back{font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:var(--mut);background:none;border:1px solid var(--panel-bd);border-radius:9px;padding:8px 14px;cursor:pointer;transition:.2s}
.back:hover{color:var(--ink);border-color:var(--mut);transform:translateX(-2px)}
.axnav{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.axnav a{padding:7px 12px;border-radius:8px;display:grid;place-items:center;font-weight:600;font-size:12.5px;color:var(--mut);border:1px solid var(--panel-bd);text-decoration:none;transition:.18s;white-space:nowrap}
.axnav a:hover{color:var(--ink);transform:translateY(-2px)}
.axnav a.cur{color:#fff}

.axhero{padding:60px 0 30px;position:relative;overflow:hidden}.axhero .pill{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--axc);border:1.5px solid var(--axc);border-radius:999px;padding:7px 16px}
.axhero .pill::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--axc);box-shadow:0 0 10px var(--axc)}
.axhero h1{font-family:var(--serif);font-weight:600;font-size:clamp(34px,5vw,58px);margin:18px 0 6px;letter-spacing:-.01em}
.axhero .axsub{font-family:var(--mono);font-size:13px;letter-spacing:.04em;color:var(--faint)}
.axhero .motto{margin-top:18px;font-family:var(--serif);font-style:italic;font-size:22px;color:var(--mut)}

.block{margin-top:34px}
.block .lab{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--axc);margin-bottom:14px;display:flex;align-items:center;gap:12px}
.block .lab::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--panel-bd),transparent)}
.q{font-family:var(--serif);font-size:15.5px;line-height:1.72;max-width:none;color:var(--ink)}
.q .tag{color:var(--axc);font-style:normal;font-weight:600}
.prose{color:var(--mut);font-size:15.5px;line-height:1.72;max-width:none}
.prose b,.prose strong{color:var(--ink);font-weight:600}

table.pubs{width:100%;border-collapse:collapse;margin-top:4px;font-size:13.5px}
table.pubs th{text-align:left;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:0 14px 11px;border-bottom:1px solid var(--panel-bd)}
table.pubs td{padding:13px 14px;border-bottom:1px solid var(--panel-bd);vertical-align:top;color:var(--ink)}
table.pubs tr:hover td{background:var(--bg2)}
table.pubs .t{color:var(--ink);font-weight:500;line-height:1.45}
table.pubs .t .au{display:block;color:var(--faint);font-size:11.5px;font-weight:400;margin-top:3px}
table.pubs .v{color:var(--mut);white-space:nowrap;font-size:12.5px}
table.pubs .n{color:var(--mut);font-size:12px}
.star{color:var(--brain)}
.tags3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:6px}
.lcard{background:#fff;border:1px solid var(--panel-bd);border-radius:12px;padding:15px 16px;box-shadow:0 4px 14px rgba(11,18,32,.04)}
.lcard h4{margin:0 0 6px;font-size:14px;color:var(--ink)}
.lcard p{margin:0;font-size:12.5px;color:var(--mut);line-height:1.5}
.lcard .lv{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
.foot{margin-top:56px;text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}

@media(max-width:760px){
  .pillars{grid-template-columns:1fr}
  .stage{aspect-ratio:auto;height:360px}
  .node .chip{padding:8px 11px}
  .node .ntxt b{font-size:12px}
  .tags3{grid-template-columns:1fr}
  .bandlabel{font-size:9px}
}
</style>
</head>
<body>

<nav class="topnav"><div class="wrap">
  <span class="logo"><b>Sanghoon Lee</b> <span class="accent">· Research Program</span></span>
  <button class="langtoggle" onclick="toggleLang()"></button>
</div></nav>

<!-- ===================== MAP VIEW ===================== -->
<div id="map-view">

  <header class="hero">
    <div class="keyword">Cyber-Physical AI</div>
    <h1 data-en='How to unify intelligence and the<br>physical system <span class="hl">without breaking</span>?' data-ko='지능은 어떻게 물리 시스템까지<br><span class="hl">깨지지 않고</span> 도달하는가'></h1>
    <p class="sub" data-en='Integrated research that connects AI, middleware, and control.<br>The conditions under which AI is preserved all the way to the physical system,<br>despite real-world uncertainty and resource limits.' data-ko='AI · 미들웨어 · 제어를 잇는 통합 연구. AI가 현실의 불확실성과 자원 제약 속에서도<br>물리 시스템까지 보존되는 조건을 다룬다.'></p>

    <div class="pillars">
      <div class="pillar p-brain"><span class="bar"></span><div class="pk">The Brain</div><h3>AI</h3><div class="motto">Good things happen often.</div><div class="pt" data-en='Often right. But not always.' data-ko='자주 옳다. 그러나 항상은 아니다.'></div></div>
      <div class="pillar p-nerve"><span class="bar"></span><div class="pk">The Nerve</div><h3>ROS 2</h3><div class="motto">All things stay connected.</div><div class="pt" data-en='Its decisions arrive unbroken.' data-ko='그 판단이 끊김 없이 전달되어야 한다.'></div></div>
      <div class="pillar p-body"><span class="bar"></span><div class="pk">The Body</div><h3>CPS</h3><div class="motto">Bad things never happen.</div><div class="pt" data-en='Nothing bad may ever happen.' data-ko='그 결과로 나쁜 일은 절대 없어야 한다.'></div></div>
    </div>

    <p class="asym" data-en='AI is only <b>often</b> right, yet the physical system it enters demands to be <b>always connected</b> and to <b>never fail</b>. Research lives in the gap that bridges the two.' data-ko='AI 는 <b>자주(often)</b> 옳을 뿐인데, 그 AI 가 들어가는 물리 시스템은 <b>항상(always) 연결</b>되고 <b>절대(never) 실패하지 않기</b>를 요구한다. 그 간극을 메우는 자리에 연구가 있다.'></p>

    <div class="scrolldown"><span data-en="View the architecture" data-ko="연구 아키텍처 보기"></span><span class="arr"></span></div>
  </header>

  <section class="section">
    <div class="wrap">
      <div class="sec-head">
        <span class="kicker" data-en="Architecture" data-ko="아키텍처"></span>
        <h2 data-en="Research Architecture" data-ko="연구 아키텍처"></h2>
        <p data-en="CPAI is the research program's paradigm, and the Middleware Harness implements it as the execution layer on real robots.<br>Within this structure, the three axes (Embodied Intelligence, ROS 2 Middleware, Networked Control) interconnect." data-ko="CPAI 는 전체 연구 프로그램의 패러다임이며, Middleware Harness 는 이를 실제 로봇 시스템에서 구현하는 실행 계층이다.<br>이 구조 안에서 Embodied Intelligence, ROS 2 Middleware, Networked Control 의 세 축이 서로 연결된다."></p>
      </div>

      <div class="stage-wrap">
        <div class="stage" id="stage">
          <div class="bandlabel" style="left:21.4%;top:80%">THE BRAIN</div>
          <div class="bandlabel" style="left:50%;top:80%">THE NERVE</div>
          <div class="bandlabel" style="left:78.6%;top:80%">THE BODY</div>
          <svg viewBox="0 0 1100 680" preserveAspectRatio="none" aria-hidden="true"><g id="edges"></g></svg>
        </div>

        <div class="infobar" id="infobar">
          <span class="ib-dot"></span>
          <div>
            <div class="ib-q" data-en="Hover a node to see its question and connections here." data-ko="노드 위에 올리면 그 줄기의 질문과 연결이 여기 표시된다."></div>
            <div class="ib-c" data-en="Click to open its axis page." data-ko="클릭하면 해당 축 페이지로 이동."></div>
          </div>
        </div>

        <div class="legend">
          <span><i style="border-color:#5b6b8c"></i> <span data-en="CPAI → Harness → 3 axes (implement · connect)" data-ko="CPAI → Harness → 3축 (구현·연결)"></span></span>
          <span><i style="border-color:#9aa6c4;border-top-style:dashed"></i> <span data-en="Cross-axis sharing (data · testbed · patents)" data-ko="축 간 공유 (데이터·실험·특허)"></span></span>
        </div>
        <div class="hint"><span data-en="▶ Click a node" data-ko="▶ 줄기를 클릭하세요"></span></div>
      </div>

    </div>
  </section>
</div>

<div id="axis-views"></div>

<script>
/* ---------- I18N ---------- */
let LANG = (function(){try{return localStorage.getItem('rp-lang')||'en'}catch(e){return 'en'}})();
document.documentElement.lang = LANG;
function T(o){ return (o && typeof o==='object' && !Array.isArray(o) && ('en' in o)) ? (o[LANG]!=null?o[LANG]:o.en) : o; }
const L = {
  coreQ:{en:'Core Question',ko:'핵심 질문'},
  frame:{en:'Frame',ko:'프레임'},
  pubs:{en:'Publications',ko:'산출물'},
  highlight:{en:'Highlight',ko:'하이라이트'},
  back:{en:'← Architecture',ko:'← 연구 아키텍처'},
  thOut:{en:'Output',ko:'산출물'}, thVenue:{en:'Venue',ko:'venue'}, thNote:{en:'Note',ko:'비고'},
  indep:{en:'independent thread',ko:'독립 줄기'},
  layersHead:{en:'3-Layer Structure · Connect → Observe → Force',ko:'3계층 구조 · 연결 → 관찰 → 강제'},
  layersNote:{en:`Connect receives the rules, Observe watches the middleware state and bridges up and down, and the bottom enforces the data plane.`,
              ko:`연결이 규약을 받고, 관찰이 미들웨어 상태를 보며 위아래를 잇고, 아래에서 데이터 플레인을 강제한다.`}
};

/* ---------- DATA ---------- */
const NODES = {
  a:{name:'CPAI',axis:{en:'Paradigm',ko:'패러다임'},raw:'#6C4BD8',banner:true,x:550,y:72,
     q:{en:'What to entrust to AI, how far, and under what conditions it is safe. This work founds the field that asks it.',ko:'AI 에게 무엇을 어디까지 맡기고, 어떤 조건에서 안전한가. 이 질문을 다루는 학문 자체를 세운다.'}},

const AX={
 a:{raw:'#6C4BD8',pill:{en:'The Paradigm',ko:'패러다임 · The Paradigm'},title:'CPAI',sub:'Cyber-Physical Artificial Intelligence',
    motto:{en:'Defining how far AI can be entrusted, and founding the field.',ko:'AI 에게 무엇을 어디까지 맡길 것인가. 그 학문을 세운다.'},
    q:{en:`As AI grows more capable, whether it can be <span class="tag">safely trusted inside a real physical system</span> becomes an entirely separate problem. In an era where AI directly produces a robot's actions, what do we entrust to AI, how far, and under what conditions does that judgment stay safely governed? This work founds the very field that addresses the question.`,
       ko:`AI 가 똑똑해질수록 'AI 를 실제 물리 시스템에 믿고 맡겨도 되는가' 는 전혀 다른 문제가 된다. AI 가 로봇의 행동을 직접 만들어내는 시대에, 무엇을 어디까지 AI 에게 맡기고, 어떤 조건에서 그 판단이 <span class="tag">안전하게 통제</span>되는가. 이 질문을 다루는 새로운 학문 영역 자체를 정의한다.`},
    frame:{en:`CPAI is proposed as the governing paradigm that unifies CPS and Physical AI. Instead of trusting an uncertain AI's judgment as-is, it proposes a PIT structure that checks each output at the boundary <b>(Projection)</b>, bounds its resources and time <b>(Isolation)</b>, and reverts to a verified action when at risk <b>(Transfer)</b>. This formalizes CPS as a 3C Substrate(Control·Computing·Communication) × 3S Primitives(State·Step·Stream), and against AI's uncertainty(opacity·stochasticity·distributional shift) determinism is reconstructed not by internal proof but by boundary enforcement and runtime assurance.`,
           ko:`CPS 와 Physical AI 를 하나로 묶는 지배 패러다임으로 <b>CPAI</b> 를 제안. 불확실한 AI 의 판단을 그대로 믿는 대신, 그 판단을 경계에서 검사하고 <b>(Projection)</b>, 자원·시간을 묶고 <b>(Isolation)</b>, 위험하면 검증된 동작으로 되돌리는 <b>(Transfer)</b> PIT 구조를 제안. 이는 CPS 를 3C Substrate(Control·Computing·Communication) × 3S Primitives(State·Step·Stream)로 정형화하고, AI 의 불확실성(opacity·stochasticity·distributional shift) 앞에서 결정성을 내부 증명이 아니라 경계 강제·런타임 보증으로 재구성한다.`},
    pubs:[['<span class="star">★</span> Ph.D. Dissertation · Cyber-Physical Artificial Intelligence: A Unified Framework for Embodied Intelligence','<b>Sanghoon Lee</b> (Advisor: Kyung-Joon Park)','DGIST','Ph.D. Dissertation · 2026'],
          ['Cyber-Physical AI: Unifying Cyber-Physical Systems and Physical Artificial Intelligence','<b>Sanghoon Lee</b>, Guoliang Xing, Xue Liu, Karl H. Johansson, Kyung-Joon Park','ACM TCPS (20th Anniversary)','Invited · Under Review'],
          ['From Hype to Reality: A Survey of Physical AI in Industrial Robotics','<b>Sanghoon Lee*</b>, Jiyeong Chae*, Jinhong Park, Kyung-Joon Park','Elsevier EAAI','Under Review'],
          ['Cyber-Physical AI: Systematic Research Domain for Integrating AI and Cyber-Physical Systems','<b>Sanghoon Lee</b>, Jiyeong Chae, Kyung-Joon Park','ACM TCPS','Published · 2025'],
          ['Integrating ROS 2 and Physical AI: Architecture and Challenges','<b>Sanghoon Lee</b>, Jiyeong Chae, Kyung-Joon Park','ICUFN 2025','Published · 2025'],
          ['A Survey and Perspective on Industrial Cyber-Physical Systems (ICPS): From ICPS to AI-augmented ICPS','Jiyeong Chae*, <b>Sanghoon Lee*</b>, Junhyung Jang, Seohyung Hong, Kyung-Joon Park','IEEE TICPS','Published · 2023']],
    asset:{en:`Defined the research domain Cyber-Physical AI for the first time at ACM TCPS (2025), carried forward as a single lineage through the 20th-anniversary Invited paper (co-authored with Xing · Liu · Johansson).`,
           ko:`Cyber-Physical AI 라는 연구 도메인을 ACM TCPS 에 처음 정의(2025)하고, 20주년 Invited paper(Xing·Liu·Johansson 공저)로 이어가는 단일 lineage.`}},

 c:{raw:'#0E7FB8',pill:{en:"CPAI's implementation · connects 3 axes",ko:'CPAI 의 구현 · 3축 연결'},title:'Middleware Harness',sub:{en:"CPAI's actual implementation",ko:'CPAI 의 실제 구현'},
    motto:{en:'Implementing CPAI in real robot middleware, connecting the three axes.',ko:'CPAI 를 실제 로봇 미들웨어에서 구현해, 세 축을 잇는다'},
    q:{en:`The realization of CPAI must take place in a middleware that can fully observe and control both the model and the system. This is not about rebuilding the safety layer from scratch each time, but about following ROS's philosophy of <span class="tag">"not reinventing the wheel"</span>.`,
       ko:`CPAI 의 구현은 모델과 시스템을 전부 관측하고 통제할 수 있는 미들웨어에서 이뤄져야 한다. 이는 안전장치를 항상 새로 구축하는 것이 아니라, <span class="tag">'바퀴를 다시 발명하지 않는다'</span> 는 ROS 의 철학을 따르기 위함이다.`},
    frame:{en:`Middleware Harness is <b>the layer that implements the boundary enforcement (PIT) proposed by CPAI in real robot middleware</b>. Just as an LLM agent harness turns a model into a trustworthy agent, the harness of Physical AI is the robot middleware. It is the junction that connects <b>CPAI (the paradigm) and the three axes (Embodied Intelligence · ROS 2 Middleware · Networked Control)</b>, where all three layers meet in the middleware.`,
           ko:`Middleware Harness 는 <b>CPAI 가 제안한 경계 강제(PIT)를 실제 로봇 미들웨어에서 구현하는 계층</b>이다. LLM agent harness 가 모델을 신뢰 가능한 에이전트로 만들 듯, Physical AI 의 harness 는 로봇 미들웨어다. <b>CPAI(패러다임)와 세 축(Embodied Intelligence · ROS 2 Middleware · Networked Control)을 잇는 접점</b>으로, 미들웨어에서는 세 계층이 전부 맞닿는다.`},
    layers:[[{en:'TOP',ko:'상'},{en:'Connect',ko:'연결 (Connect)'},{en:'Links the rules declared at the app / intelligence level to the middleware. Realizes PIT (Projection·Isolation·Transfer) as a ROS 2 profile.',ko:'앱·지능 레벨에서 정한 규약을 미들웨어와 연결. PIT(Projection·Isolation·Transfer)를 ROS 2 profile 로 구체화'},'Embodied Intelligence'],
            [{en:'MID',ko:'중'},{en:'Observe',ko:'관찰 (Observe)'},{en:'Observes the middleware state to bridge the top (Connect) and bottom (Control). Minimizes observation cost while maximizing information.',ko:'미들웨어 상태를 관찰하여, 위(연결)와 아래(제어)를 이어준다. 관찰 비용을 최소화하며, 정보를 최대화'},'ROS 2 Middleware'],
            [{en:'BOTTOM',ko:'하'},{en:'Force',ko:'강제 (Force)'},{en:'Based on what Observe sees, enforces control, communication, and computation on the data plane.',ko:'관찰이 파악한 상태에 따라 데이터 플레인에서 제어, 통신, 연산을 강제한다.'},'Networked Control']],
    pubs:[['<b>Harness Engineering for Physical AI</b>: Robot Middleware Is the Harness Layer','<b>Sanghoon Lee</b>, Jiyeong Chae, Kyung-Joon Park','Middleware 2026','Under Review'],
          ['<b>ros2probe</b>: Non-intrusive, Kernel-selective Observability for Robot Operating System 2 Middleware','Jisang Yu*, <b>Sanghoon Lee*</b>, Kyung-Joon Park','Middleware 2026','Under Review']],
    asset:{en:`A 3-layer middleware harness that implements CPAI's PIT in real middleware to connect the three axes. Trust accumulates Observe (ros2probe) → Connect (Harness Profile) → Control (Harness Engine), running as an eBPF sidecar with zero code changes.`,
           ko:`CPAI 의 PIT 를 실제 미들웨어에서 구현해 세 축을 잇는 3계층 harness. 관찰(ros2probe) → 연결(Harness Profile) → 제어(Harness Engine)로 신뢰를 누적하며, 기존 코드 수정 없이 eBPF 사이드카로 동작한다.`}},

 b:{raw:'#0072CE',pill:{en:'Nerve · ROS 2',ko:'Nerve · ROS 2'},title:'ROS 2 Middleware',sub:'Space · Time · State',

 d:{raw:'#CF3B39',pill:{en:'Body · CPS',ko:'Body · CPS'},title:'Networked Control',sub:{en:'Reliability · resilience · security of control over networks',ko:'네트워크 위 제어의 신뢰성·복원·보안'},

    pubs:[['Exploiting ROS 2’s Blind Spot: Cross-Layer Attacks from Discovery to ARP Spoofing','Hyunho Ryu*, <b>Sanghoon Lee*</b>, Minchan Kwak, Kyung-Joon Park','IEEE IoT-J','Under Review'],
          ['AI over the Air','<b>Sanghoon Lee</b>, Kyung-Joon Park','Survey','In Preparation'],
          ['DIDoS: Disturbance-induced Denial-of-service Attack in Networked Cyber-physical Systems','Sangjun Kim, <b>Sanghoon Lee</b>, Kyung-Joon Park','IJCAS','Published · 2025'],
          ['Vulnerability Analysis of Cross-Layer Attacks on ROS 2','Hyunho Ryu, <b>Sanghoon Lee</b>, Kyung-Joon Park','ICTC 2025','Published · 2025'],
          ['Priority-Driven Resource Allocation with Reuse for Platooning in 5G Vehicular Network','Tae-Woo Kim, <b>Sanghoon Lee</b>, Dong-Hyung Lee, Kyung-Joon Park','Sustainability','Published · 2025'],
          ['Learning-Enabled Network-Control Co-design for Energy-Efficient Industrial Internet of Things','Sihoon Moon, <b>Sanghoon Lee</b>, Wonhong Jeon, Kyung-Joon Park','IEEE TNSM','Published · 2024'],
          ['Real-Time Controller Reconfiguration for Delay-Resilient Cyber-Physical Systems','Sangjun Kim, <b>Sanghoon Lee</b>, Kyung-Joon Park','IEEE Access','Published · 2022'],
          ['Resilient Controller Reconfiguration under Network Delay Attack in Cyber-Physical Systems','Sangjun Kim, <b>Sanghoon Lee</b>, Kyung-Joon Park','ICEIC 2022','Published · 2022']],
    asset:{en:`From controller reconfiguration · DoS · cross-layer attacks · 5G resource allocation, it binds the reliability, resilience, and security of control over networks into one axis. Owns the CPS guarantee that "nothing bad ever happens".`,
           ko:`제어 재구성 · DoS · 크로스레이어 공격 · 5G 자원할당까지, 네트워크 위 제어의 신뢰성·복원·보안을 한 축으로 묶는다. CPS 의 '절대 실패 없음'을 책임진다.`}}
};
const ORDER=['a','c','e','b','d'];

/* ---------- RENDER MAP ---------- */
const VB={w:1100,h:680};
const stage=document.getElementById('stage');
const edgesG=document.getElementById('edges');
const infobar=document.getElementById('infobar');
function strokeOf(t){if(t==='share')return '#9aa6c4';return '#5b6b8c';}
EDGES.forEach(e=>{
  const A=NODES[e.f],B=NODES[e.t];
  const dx=Math.abs(A.x-B.x), sameRow=Math.abs(A.y-B.y)<60;
  const mx=(A.x+B.x)/2, my=(A.y+B.y)/2+(sameRow?0.18*dx:0);
  const ln=document.createElementNS('http://www.w3.org/2000/svg','path');
  ln.setAttribute('d',`M ${A.x} ${A.y} Q ${mx} ${my} ${B.x} ${B.y}`);
  ln.setAttribute('fill','none');ln.setAttribute('class','edge');ln.dataset.from=e.f;ln.dataset.to=e.t;
  ln.setAttribute('stroke',strokeOf(e.type));
  ln.setAttribute('stroke-width',e.type==='strong'?3.4:e.type==='mid'?2.4:1.8);
  ln.setAttribute('stroke-opacity',e.type==='share'?.6:.92);
  if(e.type==='share')ln.setAttribute('stroke-dasharray','2 9');
  edgesG.appendChild(ln);
});
function buildNodes(){
  stage.querySelectorAll('.node').forEach(n=>n.remove());
  Object.entries(NODES).forEach(([id,n])=>{
    const btn=document.createElement('button');
    btn.className='node'+(n.banner?' banner':n.bridge?' bridge':'');btn.dataset.id=id;
    btn.style.left=(n.x/VB.w*100)+'%';btn.style.top=(n.y/VB.h*100)+'%';btn.style.setProperty('--nclr',n.raw);
    const sub=(n.banner||n.bridge)?`<span>${T(n.axis)}</span>`:'';
    btn.innerHTML=`<div class="chip"><span class="dot"></span><div class="ntxt"><b>${n.name}</b>${sub}</div></div>`;
    btn.addEventListener('mouseenter',()=>hover(id));
    btn.addEventListener('focus',()=>hover(id));
    btn.addEventListener('mouseleave',clearHover);
    btn.addEventListener('blur',clearHover);
    btn.addEventListener('click',()=>{location.hash='#'+id;});
    stage.appendChild(btn);
  });
}
function hover(id){
  const n=NODES[id];
  stage.classList.add('has-hover');
  const conn=new Set();CONN[id].forEach(e=>{conn.add(e.f);conn.add(e.t);});
  document.querySelectorAll('.edge').forEach(el=>{const on=el.dataset.from===id||el.dataset.to===id;el.classList.toggle('on',on);});
  document.querySelectorAll('.node').forEach(el=>{el.classList.toggle('dim',!(el.dataset.id===id||conn.has(el.dataset.id)));});
  const links=CONN[id].map(e=>{const other=NODES[e.f===id?e.t:e.f];return `<b>${other.name}</b> · ${T(e.lab)}`;}).join('<br>');
  infobar.style.borderColor=n.raw;
  infobar.innerHTML=`<span class="ib-dot" style="background:${n.raw}"></span><div style="min-width:0"><div class="ib-q"><b style="color:${n.raw}">${n.name}</b> &nbsp;<span style="color:var(--faint);font-family:var(--mono);font-size:12px">${T(n.axis)}</span></div><div class="ib-c" style="font-family:var(--serif);font-size:16px;color:var(--ink);margin-top:6px">${T(n.q)}</div><div class="ib-c" style="white-space:nowrap;overflow-x:auto">${links||T(L.indep)}</div></div>`;
}
function clearHover(){
  stage.classList.remove('has-hover');
  document.querySelectorAll('.edge').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.node').forEach(el=>el.classList.remove('dim'));
}

/* ---------- AXIS PAGES ---------- */
function tbl(rows){return `<table class="pubs"><thead><tr><th>${T(L.thOut)}</th><th>${T(L.thVenue)}</th><th>${T(L.thNote)}</th></tr></thead><tbody>${rows.map(r=>`<tr><td class="t">${r[0]}${r[1]?'<span class="au">'+r[1]+'</span>':''}</td><td class="v">${r[2]}</td><td class="n">${r[3]}</td></tr>`).join('')}</tbody></table>`;}
function layerCard(l,raw){return `<div class="lcard"><div class="lv" style="color:${raw}">${T(l[0])} · ${T(l[1]).split(' ')[0]}${l[3]?' → '+l[3]:''}</div><h4>${T(l[1])}</h4><p>${T(l[2])}</p></div>`;}
function renderAxis(id){
  const x=AX[id],n=NODES[id];
  const nav=ORDER.map(k=>`<a href="#${k}" class="${k===id?'cur':''}" style="${k===id?`background:${NODES[k].raw};border-color:${NODES[k].raw}`:''}">${NODES[k].name}</a>`).join('');
  let layers='';
  if(x.layers){layers=`<div class="block"><div class="lab">${T(L.layersHead)}</div><div class="tags3">${x.layers.map(l=>layerCard(l,x.raw)).join('')}</div><p class="prose" style="margin-top:14px">${T(L.layersNote)}</p></div>`;}
  const cnt=(x.pubs||[]).length;
  return `<section class="axis-view" id="axis-${id}" style="--axc:${x.raw}">
    <div class="topbar"><div class="wrap">
      <div class="tb-left">
        <button class="back" onclick="location.hash=''">${T(L.back)}</button>
        <button class="langtoggle" onclick="toggleLang()"></button>
      </div>
      <div class="axnav">${nav}</div>
    </div></div>
    <div class="wrap">
      <div class="axhero">
        <span class="pill">${T(x.pill)}</span>
        <h1>${x.title}</h1>
        <div class="axsub">${T(x.sub)}</div>
        <div class="motto">${T(x.motto)}</div>
      </div>
      <div class="block"><div class="lab">${T(L.coreQ)}</div><div class="q">${T(x.q)}</div></div>
      <div class="block"><div class="lab">${T(L.frame)}</div><p class="prose">${T(x.frame)}</p></div>
      ${layers}
      <div class="block"><div class="lab">${T(L.pubs)} · ${cnt}</div>${tbl(x.pubs)}</div>      <div class="foot"><b>Sanghoon Lee</b> · Research Program — ${x.title}</div>
    </div>
  </section>`;
}
function buildAxes(){ document.getElementById('axis-views').innerHTML=ORDER.map(renderAxis).join(''); }

/* ---------- I18N APPLY + TOGGLE ---------- */
function applyStatic(){ document.querySelectorAll('[data-en]').forEach(el=>{ el.innerHTML = el.getAttribute('data-'+LANG); }); }
function setLangBtns(){ document.querySelectorAll('.langtoggle').forEach(b=>{ b.textContent = LANG==='en'?'한국어':'English'; }); }
function toggleLang(){
  LANG = LANG==='en'?'ko':'en';
  try{localStorage.setItem('rp-lang',LANG);}catch(e){}
  document.documentElement.lang=LANG;
  applyStatic(); buildNodes(); buildAxes(); setLangBtns(); route();
}

/* ---------- ROUTING ---------- */
function route(){
  const h=location.hash.replace('#','');
  document.querySelectorAll('.axis-view').forEach(v=>v.style.display='none');
  if(AX[h]){
    document.body.classList.add('axis-open');
    document.getElementById('axis-'+h).style.display='block';
    window.scrollTo(0,0);
  }else{
    document.body.classList.remove('axis-open');
  }
}
window.addEventListener('hashchange',route);

/* ---------- INIT ---------- */
buildNodes(); buildAxes(); applyStatic(); setLangBtns(); route();
</script>
</body>
</html>
