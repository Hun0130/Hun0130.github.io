    /**********************************************************
     * 2. 라이트/다크 모드 토글
     **********************************************************/
    function toggleMode() {
      const bodyElement = document.body;
      if (bodyElement.classList.contains('light-mode')) {
        bodyElement.classList.remove('light-mode');
        bodyElement.classList.add('dark-mode');
      } else {
        bodyElement.classList.remove('dark-mode');
        bodyElement.classList.add('light-mode');
      }
      // 아이콘 교체
      updateIconsForTheme();
    }

    // 아이콘 교체 함수 (ROS만 아이콘, AI/CPS는 텍스트)
    function updateIconsForTheme() {
      const isDark = document.body.classList.contains('dark-mode');
      const rosIcon = document.getElementById('ROSIcon');
      if (!rosIcon) return;
      rosIcon.src = isDark ? 'ROS2_dark.png' : 'ROS2_light.png';
    }

    // News 더보기 토글 (상위 5개 이후 news-extra + newsMore 토글)
    function toggleNews() {
      const more = document.getElementById('newsMore');
      const btn = document.getElementById('newsToggleBtn');
      const extras = document.querySelectorAll('.news-extra');
      if (!more || !btn) return;
      const isHidden = more.style.display === 'none' || more.style.display === '';
      more.style.display = isHidden ? 'block' : 'none';
      extras.forEach(el => { el.style.display = isHidden ? 'flex' : 'none'; });
      btn.textContent = isHidden ? 'Show Less' : 'Show More';
    }

    // Publications 더보기 토글
    function togglePubs() {
      const selected = document.getElementById('pubsSelected');
      const more = document.getElementById('pubsMore');
      const btn = document.getElementById('pubsToggleBtn');
      const statsText = document.getElementById('pubStatsText');
      if (!more || !btn) return;
      const isHidden = more.style.display === 'none' || more.style.display === '';
      if (selected) {
        selected.style.display = isHidden ? 'none' : 'block';
      }
      more.style.display = isHidden ? 'block' : 'none';
      btn.textContent = isHidden ? 'Selected Paper' : 'Show All';
      if (statsText) {
        statsText.style.display = isHidden ? 'none' : 'block';
      }
    }
